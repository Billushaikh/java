name: Java application
on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: cloning github repo
        uses: actions/checkout@v7.0.0

      - name: setup java
        uses: actions/setup-java@v5.5.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: compile java project
        run: javac Test.java

      - name: execute java project
        run: java Test
